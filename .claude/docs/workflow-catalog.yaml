# 工作流目录
# 由 /help 使用，用于判断用户所处阶段及下一步操作。
#
# artifact 检查：
#   glob: 文件 glob 模式 — 匹配 ≥1 个文件则视为已完成（或达到 min_count）
#   pattern: 必须出现在文件中的文本模式（在 glob 之后检查）
#   min_count: 所需的最少匹配文件数（默认：1）
#   note: 无法自动检测完成状态时显示的人工可读说明
#
# required: true → 阻塞进入下一阶段（显示为 REQUIRED）
# required: false → 可选增强项（显示为 OPTIONAL）
# repeatable: true → 可多次运行（每个系统、故事等各运行一次）
#
# 阶段门禁（/gate-check）：裁定为 ADVISORY — 指导决策方向，
# 但绝不硬性阻断推进。用户始终有权决定是否继续。

phases:

  concept:
    label: "概念"
    description: "将游戏创意发展为有文档支撑的概念"
    next_phase: systems-design
    steps:
      - id: brainstorm
        name: "头脑风暴"
        command: /brainstorm
        required: false
        description: "使用 MDA 框架、动词优先法和玩家心理学框架探索游戏概念"

      - id: engine-setup
        name: "引擎配置"
        command: /setup-engine
        required: true
        artifact:
          glob: ".claude/docs/technical-preferences.md"
          pattern: "Engine: [^[]"
        description: "配置引擎、固定版本、设置命名规范和性能预算"

      - id: game-concept
        name: "游戏概念文档"
        command: /brainstorm
        required: true
        artifact:
          glob: "design/gdd/game-concept.md"
        description: "用支柱、MDA 分析和范围层级正式化游戏概念"

      - id: design-review-concept
        name: "概念评审"
        command: /design-review
        required: false
        description: "验证游戏概念（建议在继续前执行）"

      - id: art-bible
        name: "美术圣经"
        command: /art-bible
        required: true
        artifact:
          glob: "design/art/art-bible.md"
        description: "撰写视觉风格规范（9 个章节）。使用 /brainstorm 产出的视觉身份锚点。在游戏概念确定后、系统设计开始前运行。"

      - id: map-systems
        name: "系统地图"
        command: /map-systems
        required: true
        artifact:
          glob: "design/gdd/systems-index.md"
        description: "将概念分解为带有依赖顺序和优先级分层的系统"

  systems-design:
    label: "系统设计"
    description: "为系统索引中的每个系统撰写 GDD"
    next_phase: technical-setup
    steps:
      - id: design-system
        name: "系统 GDD"
        command: /design-system
        required: true
        repeatable: true
        artifact:
          note: "检查 design/gdd/systems-index.md — 每个 MVP 系统需要 Status: Approved"
        description: "撰写按系统划分的 GDD（逐章节引导式）。每个系统运行一次。"

      - id: design-review
        name: "逐系统设计评审"
        command: /design-review
        required: true
        repeatable: true
        description: "验证每份 GDD（8 个必填章节，无 MAJOR REVISION 裁定）。每个系统运行一次。"

      - id: review-all-gdds
        name: "跨 GDD 评审"
        command: /review-all-gdds
        required: true
        artifact:
          glob: "design/gdd/gdd-cross-review-*.md"
        description: "同时对所有 GDD 进行整体一致性检查与设计理论评审"

      - id: consistency-check
        name: "一致性检查"
        command: /consistency-check
        required: false
        repeatable: true
        description: "扫描所有 GDD，查找矛盾、未定义引用和机制冲突。在 /review-all-gdds 后运行，以及每次新增或修订 GDD 后再次运行。"

  technical-setup:
    label: "技术搭建"
    description: "架构决策、视觉风格规范、无障碍基础、引擎验证"
    next_phase: pre-production
    steps:
      - id: create-architecture
        name: "架构文档"
        command: /create-architecture
        required: true
        artifact:
          glob: "docs/architecture/architecture.md"
        description: "撰写覆盖所有系统的主架构文档"

      - id: architecture-decision
        name: "架构决策记录（ADR）"
        command: /architecture-decision
        required: true
        repeatable: true
        artifact:
          glob: "docs/architecture/adr-*.md"
          min_count: 3
        description: "将关键技术决策记录为 ADR。基础层至少需要 3 个 ADR。"

      - id: architecture-review
        name: "架构评审"
        command: /architecture-review
        required: true
        artifact:
          glob: "docs/architecture/architecture-review-*.md"
        description: "验证完整性、依赖顺序、引擎兼容性"

      - id: control-manifest
        name: "控制清单"
        command: /create-control-manifest
        required: true
        artifact:
          glob: "docs/architecture/control-manifest.md"
        description: "从所有已接受的 ADR 生成供程序员使用的扁平化规则表"

      - id: accessibility-doc
        name: "无障碍要求"
        required: true
        artifact:
          glob: "design/accessibility-requirements.md"
        description: "确定无障碍等级（Basic/Standard/Comprehensive/Exemplary）并完成功能矩阵。第 4 阶段的 UX 规范将引用此等级。"

  pre-production:
    label: "预制作"
    description: "UX 规范、资源规格、核心机制原型开发、故事定义、乐趣验证"
    next_phase: production
    steps:
      - id: asset-spec
        name: "资源规格"
        command: /asset-spec
        required: false
        repeatable: true
        artifact:
          glob: "design/assets/asset-manifest.md"
        description: "从已批准的 GDD 和关卡文档生成每个资源的视觉规格和 AI 生成提示。每个系统/关卡/角色运行一次。"

      - id: ux-design
        name: "UX 规范（关键界面）"
        command: /ux-design
        required: true
        repeatable: true
        artifact:
          glob: "design/ux/*.md"
          min_count: 1
        description: "为主菜单、核心游戏 HUD 和交互模式撰写 UX 规范。从 technical-preferences.md 读取输入方式和目标平台。"

      - id: ux-review
        name: "UX 评审"
        command: /ux-review
        required: true
        description: "验证所有关键界面 UX 规范的 GDD 对齐情况和无障碍等级合规性。在创建 Epic 前运行。"

      - id: prototype
        name: "原型开发"
        command: /prototype
        required: true
        artifact:
          glob: "prototypes/*/README.md"
          min_count: 1
        description: "在隔离的工作树中构建一次性原型，验证核心机制"

      - id: create-epics
        name: "创建 Epic"
        command: /create-epics
        required: true
        repeatable: true
        artifact:
          glob: "production/epics/*/EPIC.md"
          min_count: 1
        description: "将 GDD + ADR 转化为 Epic——每个架构模块对应一个 Epic。按层运行：/create-epics layer: foundation，再 /create-epics layer: core"

      - id: create-stories
        name: "创建 Story"
        command: /create-stories
        required: true
        repeatable: true
        artifact:
          glob: "production/epics/**/*.md"
          min_count: 2
        description: "将每个 Epic 拆分为可实现的 Story 文件。每个 Epic 运行：/create-stories [epic-slug]"

      - id: test-setup
        name: "测试框架搭建"
        command: /test-setup
        required: false
        artifact:
          note: "检查 tests/ 目录，确认引擎专属测试框架已搭建"
        description: "在第一个冲刺开始前搭建一次测试框架和 CI 流水线。后续接入 /test-helpers（夹具生成）、/qa-plan（每个 Epic）和 /smoke-check（每个冲刺）。"

      - id: sprint-plan
        name: "第一个冲刺计划"
        command: /sprint-plan
        required: true
        artifact:
          glob: "production/sprints/sprint-*.md"
          min_count: 1
        description: "使用 Epic 中优先排序的 Story 规划第一个冲刺"

      - id: vertical-slice
        name: "垂直切片（已经过试玩测试）"
        command: /playtest-report
        required: true
        artifact:
          glob: "production/playtests/*.md"
          min_count: 1
        description: "使用 /playtest-report 记录垂直切片试玩测试。此阶段至少运行一次（进入制作阶段前需 ≥1 次；进入精修阶段前需 ≥3 次）。每次测试应覆盖一次完整的核心循环。"

  production:
    label: "制作"
    description: "以冲刺为基础的功能开发——认领、实现、关闭 Story"
    next_phase: polish
    steps:
      - id: sprint-plan
        name: "冲刺计划"
        command: /sprint-plan
        required: true
        repeatable: true
        artifact:
          glob: "production/sprints/sprint-*.md"
        description: "使用优先排序的就绪 Story 规划当前冲刺"

      - id: story-readiness
        name: "Story 就绪检查"
        command: /story-readiness
        required: false
        description: "在开发者认领 Story 前验证其是否已具备实现条件"

      - id: implement
        name: "实现 Story"
        command: /dev-story
        required: true
        repeatable: true
        artifact:
          note: "检查 src/ 中的活跃代码和 production/epics/**/*.md 中的进行中 Story"
        description: "认领下一个就绪 Story 并用 /dev-story [story-path] 实现。自动路由到正确的程序员 Agent。"

      - id: code-review
        name: "代码评审"
        command: /code-review
        required: false
        repeatable: true
        description: "每次 Story 实现后进行架构级代码评审。在 /dev-story 之后、/story-done 之前运行。"

      - id: story-done
        name: "Story 完成评审"
        command: /story-done
        required: true
        repeatable: true
        description: "验证所有验收标准，检查 GDD/ADR 偏差，关闭 Story"

      - id: qa-plan
        name: "QA 计划"
        command: /qa-plan
        required: false
        repeatable: true
        description: "按 Epic 或冲刺生成 QA 测试计划。运行 /qa-plan [epic-slug]。为 /smoke-check、/regression-suite 和 /test-evidence-review 生成测试用例。"

      - id: bug-report
        name: "Bug 报告 / 分类"
        command: /bug-report
        required: false
        repeatable: true
        description: "记录并优先排序实现过程中发现的 Bug。/bug-report 创建结构化报告；/bug-triage 对未处理积压进行优先排序。"

      - id: retrospective
        name: "冲刺回顾"
        command: /retrospective
        required: false
        repeatable: true
        description: "冲刺结束后的复盘，总结哪些有效、哪些需要改进。在每个冲刺结束后、规划下一个冲刺前运行。"

      - id: team-feature
        name: "团队协作编排（可选）"
        required: false
        repeatable: true
        description: "为复杂功能协调多个 Agent 协同工作。可用：/team-combat、/team-narrative、/team-ui、/team-audio、/team-level、/team-live-ops、/team-qa。当一个功能跨越多个 Agent 域时运行。"

      - id: scope-check
        name: "范围检查"
        command: /scope-check
        required: false
        repeatable: true
        artifact:
          glob: "production/sprints/sprint-*.md"
          note: "在冲刺中途新增 Story 时，或在冲刺回顾前运行"
        description: "通过对比当前冲刺范围与原始 Epic 范围来检测范围蔓延。在以下情况运行：(a) 冲刺中途新增 Story 时，或 (b) 冲刺回顾前。"

      - id: sprint-status
        name: "冲刺状态"
        command: /sprint-status
        required: false
        description: "不生成完整报告，快速输出 30 行冲刺进度快照"

  polish:
    label: "精修"
    description: "性能优化、平衡调整、试玩测试、修复 Bug"
    next_phase: release
    steps:
      - id: perf-profile
        name: "性能分析"
        command: /perf-profile
        required: false
        description: "分析并优化 CPU/GPU/内存瓶颈"

      - id: balance-check
        name: "平衡检查"
        command: /balance-check
        required: false
        description: "分析游戏平衡公式和数据，查找异常值和损坏的进度曲线"

      - id: asset-audit
        name: "资源审计"
        command: /asset-audit
        required: false
        description: "验证命名规范、文件格式标准和尺寸预算"

      - id: playtest-polish
        name: "试玩测试（×3 次）"
        command: /playtest-report
        required: true
        artifact:
          glob: "production/playtests/*.md"
          min_count: 3
        description: "覆盖范围：新手体验、中期系统、难度曲线"

      - id: team-polish
        name: "打磨团队全面通过"
        command: /team-polish
        required: true
        description: "跨性能、音频、视觉和 UX 的协调打磨"

  release:
    label: "发布"
    description: "发行准备、认证和上线"
    next_phase: null
    steps:
      - id: release-checklist
        name: "发布检查清单"
        command: /release-checklist
        required: true
        description: "覆盖所有部门的预发布验证：代码、内容、商店、法务"

      - id: patch-notes
        name: "补丁说明"
        command: /patch-notes
        required: false
        description: "从 git 历史和冲刺数据生成面向玩家的补丁说明"

      - id: changelog
        name: "变更日志"
        command: /changelog
        required: false
        description: "从提交记录、冲刺和设计文档自动生成内部变更日志"

      - id: launch-checklist
        name: "上线检查清单"
        command: /launch-checklist
        required: true
        description: "最终上线就绪检查——发布给玩家前的最后一道门禁"
