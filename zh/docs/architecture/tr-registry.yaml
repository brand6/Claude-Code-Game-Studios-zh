# 技术需求 ID 注册表
#
# 用途：为每条 GDD 技术需求提供持久、稳定的 ID。
# 防止 /architecture-review 运行时 TR-ID 重新编号，
# 否则会破坏 Story 中的引用。
#
# 规则：
#   - ID 是永久性的。永远不要重新编号，永远不要删除（使用 status: deprecated）。
#   - 只在每个系统列表的末尾添加新条目。
#   - 当 GDD 需求被重新措辞（意图不变）时：更新 `requirement`
#     文本并添加 `revised` 日期。ID 保持不变。
#   - 当需求从 GDD 中移除时：将 status 设为 deprecated。
#   - 当需求被拆分或替换时：将 status 设为 superseded-by，
#     并填写新的 TR-ID。
#
# 写入方：/architecture-review（追加新条目，从不覆盖）
# 读取方：    /create-stories（将 ID 嵌入 Story）
#             /story-done（在评审时查阅当前需求文本）
#             /story-readiness（验证 TR-ID 存在且处于 active 状态）
#
# ID 格式：TR-[system-slug]-[NNN]
#   system-slug = 与 GDD 系统名称匹配的短 slug
#   NNN = 每个系统从 001 开始的三位零填充序列号
#
# 状态值：active | deprecated | superseded-by: TR-[system]-NNN

version: 1
last_updated: ""

requirements: []

