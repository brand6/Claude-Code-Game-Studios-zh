# 游戏世界实体注册表
#
# 用途：存储出现在多个文档中的所有具名游戏世界事实的单一可信来源。
# Skills 在撰写新内容之前会检查此文件，以便在撰写时检测跨文档不一致。
#
# 规则：
#   - 只注册跨系统边界的事实。仅在内部使用的事实
#     （仅在一份 GDD 中使用的公式）无需注册。
#   - 永远不要删除条目——将 status 设为 deprecated 即可。
#   - 值发生变化时：更新值，将 revised: 设为今日日期，
#     并添加注释说明旧值及哪份 GDD 做出了修改。
#   - source: 是权威 GDD——即"拥有"此事实的文档。
#     引用它的其他 GDD 将自身列入 referenced_by。
#   - 当新 GDD 引用现有条目时，将其路径追加到
#     referenced_by，不要创建重复条目。
#
# 写入方：/design-system（第 5 阶段——GDD 章节获批后）
#             /consistency-check（解决冲突时）
# 读取方：    /design-system（第 2 阶段——撰写开始前，以及 C/D 章节
#               写入后用于冲突检查新实体/公式）
#             /consistency-check（主要输入——先 grep，再读 GDD）
#             /review-all-gdds（第 1 阶段——第 2 阶段检查的基准）
#             /architecture-review（数据结构和接口验证）
#
# 搜索模式（供使用 Grep 的 skills 参考）：
#   所有实体名：        Grep pattern="^  - name:" path="design/registry/entities.yaml"
#   特定实体：          Grep pattern="  - name: goblin" path="design/registry/entities.yaml"
#   所有道具：          Grep pattern="^  - name:" path="design/registry/entities.yaml"（items 区段）
#   combat.md 拥有的：  Grep pattern="source: design/gdd/combat.md"
#   inventory.md 使用： Grep pattern="referenced_by.*inventory"
#   所有金币值：         Grep pattern="value_gold:"
#   已废弃条目：         Grep pattern="status: deprecated"
#
# 格式：YAML。一致的缩进对 grep 可靠性至关重要。
#   区段：entities | items | formulas | constants
#   每个条目：name, status, source, referenced_by[], attributes{}, added, revised

version: 1
last_updated: ""

# ─── 实体 ────────────────────────────────────────────────────────────────
# 具名游戏世界对象：敌人、NPC、角色、派系、Boss。
# 当一个实体出现在多份 GDD 中时在此注册——例如，在 combat.md 中定义的
# 敌人同时在 inventory.md 中列出掉落物。
#
# 必填字段：name, status, source, referenced_by, added
# 属性字段：可能出现在其他 GDD 中的关键数值
#   （生命值、伤害、掉落物、派系等）

entities: []

# 示例（添加第一条真实条目时删除）：
#
# entities:
#   - name: goblin
#     status: active              # active | deprecated
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md
#     health: 40
#     damage: 8
#     drops:
#       - item: goblin_arm        # 必须匹配 items 区段中的条目
#         qty: 1
#         drop_rate: 0.8          # 0.0–1.0
#     added: 2026-03-26
#     revised: ""


# ─── 道具 ───────────────────────────────────────────────────────────────────
# 具名可收集物、装备、消耗品、制作材料、货币。
# 当一个道具的名称或数值出现在多份 GDD 中时在此注册。
#
# 必填字段：name, status, source, referenced_by, added
# 属性字段：value_gold、weight、stackable、category，以及任一
#   可能被其他系统（如 economy、crafting）引用的属性修饰项。

items: []

# 示例：
#
# items:
#   - name: goblin_arm
#     status: active
#     source: design/gdd/combat.md   # 掉落定义于 combat GDD
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md    # inventory GDD 列出其重量/堆叠规则
#       - design/gdd/economy.md      # economy GDD 引用其出售价格
#     value_gold: 5
#     weight: 1
#     stackable: true
#     category: crafting_material
#     added: 2026-03-26
#     revised: ""


# ─── 公式 ────────────────────────────────────────────────────────────────
# 具名计算公式，具有定义明确的变量和输出范围。
# 当一个公式的输出成为另一系统的输入，或另一份 GDD 通过名称引用它时在此注册。
#
# 必填字段：name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# 可选字段：expression（实际公式）、notes

formulas: []

# 示例：
#
# formulas:
#   - name: damage_formula
#     status: active
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/progression.md   # progression GDD 缩放 attack 变量
#     variables:
#       - attack
#       - defense
#       - crit_chance
#       - crit_multiplier
#     output_range: [0, 999]
#     expression: "max(0, attack - defense) * (1 + crit_chance * crit_multiplier)"
#     notes: "输出进入 health-system 的伤害输入。最小值为 0（护甲
#       可吸收全部伤害）。公式本身理论上无上限，但 combat.md 中的
#       调参项 damage_cap 将其限制为 999。"
#     added: 2026-03-26
#     revised: ""


# ─── 常量 ───────────────────────────────────────────────────────────────
# 跨多个系统引用的具名数值。
# 当某个常量定义于一份 GDD，但另一份 GDD 也必须与之保持一致时在此注册
# （例如：economy 中定义的金币携带上限需要 inventory 检查，
# 或 inventory 中定义的基础背包格数需要在 HUD 中显示）。
#
# 必填字段：name, status, source, referenced_by, value, unit, added

constants: []

# 示例：
#
# constants:
#   - name: gold_carry_limit
#     status: active
#     source: design/gdd/economy.md
#     referenced_by:
#       - design/gdd/economy.md
#       - design/gdd/inventory.md   # inventory 强制执行携带上限
#       - design/gdd/ui.md          # HUD 显示当前金币与上限
#     value: 9999
#     unit: gold
#     added: 2026-03-26
#     revised: ""
#
#   - name: base_inventory_slots
#     status: active
#     source: design/gdd/inventory.md
#     referenced_by:
#       - design/gdd/inventory.md
#       - design/gdd/progression.md  # progression 解锁额外槽位
#     value: 20
#     unit: slots
#     added: 2026-03-26
#     revised: ""
